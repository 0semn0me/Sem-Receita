<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa de Sugestões</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #f7f9fc; margin: 0; padding: 0; color: #333; }
        
        .header {
            background: linear-gradient(135deg, #ff5e00, #e62222);
            padding: 25px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-voltar { color: white; text-decoration: none; font-size: 24px; font-weight: bold; }
        .header h1 { color: white; margin: 0; font-size: 22px; font-weight: bold; }

        .container { padding: 20px 15px; }

        .box-sugestao {
            background: white;
            border-radius: 24px;
            padding: 25px 20px;
            border: 1px solid #eef2f6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            margin-bottom: 25px;
        }
        .box-title { font-size: 22px; font-weight: bold; color: #ff5e00; margin: 0 0 10px 0; }
        .box-desc { color: #64748b; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }

        .form-group { display: flex; gap: 10px; }
        .form-group input {
            flex: 1;
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus { border-color: #ff5e00; }
        
        .btn-sugerir {
            background: #e67e22;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .list-title { font-size: 12px; font-weight: bold; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        
        .sugestao-item {
            background: white;
            border: 1px solid #f1f5f9;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sugestao-texto { font-size: 15px; color: #334155; font-weight: bold; }
        .btn-deletar { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 16px; }
        .btn-deletar:hover { color: #ef4444; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-voltar">←</a>
        <h1>Caixa de Sugestões</h1>
    </div>

    <div class="container">
        <div class="box-sugestao">
            <div class="box-title">💡 Enviar Sugestão</div>
            <div class="box-desc">Diga qual prato você quer ver no site! Todo mundo pode sugerir, mas só o dono pode apagar.</div>
            <div class="form-group">
                <input type="text" id="inputSugestao" placeholder="Ex: Estrogonofe, Lasanha...">
                <button class="btn-sugerir" onclick="adicionarSugestao()">Sugerir</button>
            </div>
        </div>

        <div class="list-title">Sugestões Recebidas</div>
        <div id="listaSugestoes"></div>
    </div>

<script>
    let listaLocal = JSON.parse(localStorage.getItem('sugestoes_banco')) || [];

    function renderizarSugestoes() {
        const container = document.getElementById('listaSugestoes');
        container.innerHTML = '';

        if (listaLocal.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:14px; margin-top:20px;">Nenhuma sugestão ainda. Seja o primeiro!</div>';
            return;
        }

        listaLocal.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'sugestao-item';
            div.innerHTML = `
                <span class="sugestao-texto">${item}</span>
                <button class="btn-deletar" onclick="removerSugestao(${idx})">🗑️</button>
            `;
            container.appendChild(div);
        });
    }

    function adicionarSugestao() {
        const campo = document.getElementById('inputSugestao');
        const valor = campo.value.trim();
        if (valor === '') return;

        listaLocal.push(valor);
        localStorage.setItem('sugestoes_banco', JSON.stringify(listaLocal));
        campo.value = '';
        renderizarSugestoes();
    }

    function removerSugestao(index) {
        const senha = prompt("Digite a senha de administrador para excluir:");
        if (senha === "123") {
            listaLocal.splice(index, 1);
            localStorage.setItem('sugestoes_banco', JSON.stringify(listaLocal));
            renderizarSugestoes();
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    }

    document.addEventListener('DOMContentLoaded', renderizarSugestoes);
</script>
</body>
</html>
