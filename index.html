<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Receitas</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f5f7fb; margin: 0; padding: 0; color: #333; }
        
        /* CADEÇALHO PREMIUM ORIGINAL (FOTO 3) */
        .header {
            background: linear-gradient(135deg, #ff5e00, #e62222);
            padding: 25px 20px 30px 20px;
            position: relative;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .logo-circle { 
            background: white; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
        }
        .header h1 { color: white; margin: 0; font-size: 26px; font-weight: bold; }
        
        /* BADGE DO CÓDIGO PÚBLICO */
        .public-badge {
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        /* ☰ BOTÃO DO MENU DIRECIONADO PELO DEDINHO */
        .btn-menu {
            position: absolute;
            top: 25px;
            right: 20px;
            color: white;
            text-decoration: none;
            font-size: 32px;
            line-height: 1;
            z-index: 10;
        }

        /* CAIXA DE BUSCA COM O SEU TEXTO E EMOTE (FOTO 1 e 3) */
        .search-container { position: relative; width: 100%; }
        .search-container input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .search-container::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 13px;
            font-size: 16px;
            color: #999;
        }

        /* CONTAINER DOS CARDS */
        .container { padding: 15px; }

        /* CARD DA RECEITA ESTILO APLICATIVO (FOTO 3) */
        .recipe-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 25px;
        }

        /* TOPO DO CARD EM AZUL ESCURO ORIGINAL */
        .recipe-top {
            background: #0e1e38;
            padding: 20px;
            color: white;
            position: relative;
        }
        .recipe-title-row { display: flex; justify-content: space-between; align-items: flex-start; padding-right: 25px; }
        .recipe-title { font-size: 24px; font-weight: bold; margin: 0; color: white; }
        .recipe-badge {
            background: #ff6b00;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .recipe-desc { color: #a1b0cb; font-size: 14px; margin: 12px 0 0 0; line-height: 1.4; font-style: italic; }

        /* SEÇÃO BEGE DE VARIAÇÃO E RENDIMENTO (FOTO 3) */
        .recipe-controls {
            background: #fffdf9;
            padding: 20px;
            border-bottom: 1px solid #f2f5fa;
        }
        .control-label { font-size: 12px; font-weight: bold; color: #b25900; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
        
        .select-variation {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ffd8b3;
            font-size: 15px;
            background: white;
            color: #333;
            margin-bottom: 15px;
            outline: none;
        }

        .yield-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .yield-title { font-size: 12px; font-weight: bold; color: #b25900; }
        .yield-value { font-size: 13px; font-weight: bold; color: #ff6b00; text-transform: uppercase; }
        .yield-slider { width: 100%; accent-color: #ff6b00; cursor: pointer; margin-top: 5px; }

        /* CORPO DA RECEITA (LISTAS) */
        .recipe-body { padding: 20px; }
        .section-header { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; color: #1e293b; margin: 20px 0 12px 0; }
        .section-helper { font-size: 11px; color: #94a3b8; font-weight: normal; margin-left: 4px; }

        /* ITENS DA LISTA EM ARQUITETURA DE CARDS (FOTO 3 e 4) */
        .list-item {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .list-item input[type="checkbox"] { transform: scale(1.2); accent-color: #ff6b00; }
        .list-item span { font-size: 15px; line-height: 1.4; color: #334155; }
        .list-item.checked { background: #f1f5f9; }
        .list-item.checked span { text-decoration: line-through; color: #94a3b8; }
        .num-destaque { color: #ff6b00; font-weight: bold; }

        /* ETAPAS COM IDENTIFICADOR CINZA (FOTO 4) */
        .step-tag { font-size: 11px; font-weight: bold; color: #94a3b8; display: block; margin-bottom: 2px; text-transform: uppercase; }

        /* FINALIZAÇÃO LIMPA E SEM CHECKS (FOTO 2) */
        .fin-item {
            background: #f8fafc;
            border-left: 4px solid #ff6b00;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .fin-item input[type="radio"] { transform: scale(1.3); margin-top: 3px; accent-color: #ff6b00; }
        .fin-text { font-size: 15px; color: #334155; line-height: 1.4; width: 100%; cursor: pointer; }
        .fin-opt-title { font-weight: bold; color: #ff6b00; display: block; margin-bottom: 2px; font-size: 11px; text-transform: uppercase; }

        /* RODAPÉ ESCURO ORIGINAL */
        .footer {
            background: #0e1e38;
            color: #a1b0cb;
            padding: 25px 20px;
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <div class="logo-circle">🍴</div>
            <h1>Sem Receitas</h1>
        </div>
        
        <div class="public-badge">🌐 CÓDIGO 100% PÚBLICO</div>
        
        <a href="sugestoes.html" class="btn-menu">☰</a>

        <div class="search-container">
            <input type="text" id="inputBusca" placeholder="Busque sua receita, ou nos deixe uma sugestão👉🏾" oninput="filtrarReceitas()">
        </div>
    </div>

    <div class="container" id="listaReceitas"></div>

    <div class="footer">
        <strong>Sem Receitas</strong> é um indexador livre. Código-fonte hospedado de forma transparente e pública.
    </div>

<script>
    // Seus dados estruturados perfeitamente
    const dadosReceitas = [
        {
            id: 1,
            titulo: "Pudim de Leite",
            categoria: "RECEITAS GLOBO",
            descricao: "A sobremesa mais tradicional das reuniões de família.",
            variacoes: [
                {
                    nome: "Lisinho (Sem Furinhos)",
                    porcoesBase: 2,
                    ingredientes: [
                        { qtd: 0.25, unidade: "lata", nome: "de Leite condensado" },
                        { qtd: 0.25, unidade: "medida da lata", nome: "de Leite integral" },
                        { qtd: 0.75, unidade: "unidades", nome: "de Ovos inteiros" }
                    ],
                    passos: [
                        "Bata no liquidificador ou misture delicadamente o leite condensado, o leite e os ovos.",
                        "Passe a mistura por uma peneira fina para tirar as bolhas de ar.",
                        "Asse em banho-maria no forno médio (180°C) cobrindo com papel alumínio."
                    ],
                    finalizacoes: [
                        "Desenforme apenas depois de completamente gelado para não quebrar."
                    ]
                },
                {
                    nome: "Tradicional (Com Furinhos)",
                    porcoesBase: 2,
                    ingredientes: [
                        { qtd: 0.25, unidade: "lata", nome: "de Leite condensado" },
                        { qtd: 0.25, unidade: "medida da lata", nome: "de Leite" },
                        { qtd: 1, unidade: "unidade", nome: "de Ovo inteiro" }
                    ],
                    passos: [
                        "Bata todos os ingredientes no liquidificador na velocidade máxima por 3 minutos.",
                        "Despeje direto na forma caramelizada sem peneirar.",
                        "Asse em banho-maria sem cobrir para criar o topo firme."
                    ],
                    finalizacoes: [
                        "Opção Calda Extra: Jogue um pouco de calda morna por cima logo antes de servir.",
                        "Opção Textura: Sirva em temperatura ambiente se gostar dele mais cremoso."
                    ]
                }
            ]
        }
    ];

    let porcoesSelecionadas = {};

    function inicializar() {
        dadosReceitas.forEach(r => { porcoesSelecionadas[r.id] = 2; });
        renderizarReceitas(dadosReceitas);
    }

    function renderizarReceitas(lista) {
        const container = document.getElementById('listaReceitas');
        container.innerHTML = '';

        if(lista.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:40px;">Nenhuma receita encontrada...</p>';
            return;
        }

        lista.forEach(receita => {
            const card = document.createElement('div');
            card.className = "recipe-card";

            const varIndex = 0;
            const variacaoAtiva = receita.variacoes[varIndex];
            const pAtuais = porcoesSelecionadas[receita.id];

            card.innerHTML = `
                <div class="recipe-top">
                    <div class="recipe-title-row">
                        <h2 class="recipe-title">${receita.titulo}</h2>
                        <span class="recipe-badge">${receita.categoria}</span>
                    </div>
                    <p class="recipe-desc">${receita.descricao}</p>
                </div>
                
                <div class="recipe-controls">
                    <span class="control-label">FORMA DE PREPARO / VARIAÇÃO:</span>
                    <select class="select-variation" onchange="mudarVariacao(${receita.id}, this.value)">
                        ${receita.variacoes.map((v, idx) => `<option value="${idx}">${v.nome}</option>`).join('')}
                    </select>

                    <div class="yield-row">
                        <span class="yield-title">RENDIMENTO:</span>
                        <span class="yield-value"><span>${pAtuais}</span> Porções</span>
                    </div>
                    <input type="range" class="yield-slider" min="1" max="10" value="${pAtuais}" oninput="atualizarPorcoes(${receita.id}, this.value, ${varIndex})">
                </div>

                <div class="recipe-body">
                    <div class="section-header">
                        🍊 Ingredientes <span class="section-helper">(Marque os que já separou/usou)</span>
                    </div>
                    <div id="ingredientes_${receita.id}">
                        ${renderIngredientes(variacaoAtiva, pAtuais)}
                    </div>

                    <div class="section-header">
                        🧑‍🍳 Modo de Preparo <span class="section-helper">(Checklist de progresso)</span>
                    </div>
                    <div id="passos_${receita.id}">
                        ${variacaoAtiva.passos.map((passo, idx) => `
                            <div class="list-item" onclick="toggleCheck(this)">
                                <input type="checkbox">
                                <span><span class="step-tag">PASSO ${idx+1}</span>${passo}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="section-header">
                        🎂 Finalização e Toque do Chef
                    </div>
                    <div id="finalizacoes_${receita.id}">
                        ${renderFinalizacao(variacaoAtiva.finalizacoes, receita.id)}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function renderIngredientes(variacao, porcoesDesejadas) {
        return variacao.ingredientes.map(ing => {
            const qtdCalculada = ((ing.qtd / variacao.porcoesBase) * porcoesDesejadas).toFixed(2).replace('.00', '').replace('.', ',');
            return `
                <div class="list-item" onclick="toggleCheck(this)">
                    <input type="checkbox">
                    <span><span class="num-destaque">${qtdCalculada}</span> ${ing.unidade} ${ing.nome}</span>
                </div>
            `;
        }).join('');
    }

    function renderFinalizacao(finalizacoes, receitaId) {
        const eMultipla = finalizacoes.length > 1;
        return finalizacoes.map((item, idx) => {
            const textoLimpo = item.replace(/^Opção\s+[a-zA-Zà-úÀ-Ú]+\s*:\s*/i, '');
            return `
                <div class="fin-item">
                    ${eMultipla ? `<input type="radio" name="fin_grupo_${receitaId}" id="fin_${receitaId}_${idx}">` : ''}
                    <label class="fin-text" for="fin_${receitaId}_${idx}">
                        ${eMultipla ? `<span class="fin-opt-title">OPÇÃO ${idx+1}</span>` : ''}
                        ${textoLimpo}
                    </label>
                </div>
            `;
        }).join('');
    }

    function toggleCheck(elemento) {
        elemento.classList.toggle('checked');
        const box = elemento.querySelector('input');
        if(box && event.target !== box) box.checked = !box.checked;
    }

    function atualizarPorcoes(id, valor, varIdx) {
        porcoesSelecionadas[id] = parseInt(valor);
        const card = document.getElementById(`ingredientes_${id}`).closest('.recipe-card');
        card.querySelector('.yield-row span span').innerText = valor;
        
        const variacao = dadosReceitas.find(r => r.id === id).variacoes[varIdx];
        document.getElementById(`ingredientes_${id}`).innerHTML = renderIngredientes(variacao, valor);
    }

    function mudarVariacao(id, varIdx) {
        const receita = dadosReceitas.find(r => r.id === id);
        const variacaoAtiva = receita.variacoes[varIdx];
        const pAtuais = porcoesSelecionadas[id];

        document.getElementById(`ingredientes_${id}`).innerHTML = renderIngredientes(variacaoAtiva, pAtuais);
        
        document.getElementById(`passos_${id}`).innerHTML = variacaoAtiva.passos.map((passo, idx) => `
            <div class="list-item" onclick="toggleCheck(this)">
                <input type="checkbox">
                <span><span class="step-tag">PASSO ${idx+1}</span>${passo}</span>
            </div>
        `).join('');

        document.getElementById(`finalizacoes_${id}`).innerHTML = renderFinalizacao(variacaoAtiva.finalizacoes, id);
        
        const card = document.getElementById(`ingredientes_${id}`).closest('.recipe-card');
        card.querySelector('.yield-slider').setAttribute('oninput', `atualizarPorcoes(${id}, this.value, ${varIdx})`);
    }

    function filtrarReceitas() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const filtradas = dadosReceitas.filter(r => r.titulo.toLowerCase().includes(termo));
        renderizarReceitas(filtradas);
    }

    document.addEventListener('DOMContentLoaded', inicializar);
</script>
</body>
</html>
