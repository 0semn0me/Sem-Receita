<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Receitas</title>
    <style>
        /* — RESET E FONTES PADRÃO — */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #f4f6f9;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        /* — HEADER GRADIENTE ORIGINAL — */
        .header {
            background: linear-gradient(135deg, #ff5e00, #e62222);
            padding: 20px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            color: white;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .btn-menu {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
        }

        /* BARRA DE PESQUISA */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #777;
        }

        /* CÁPSULAS DE FILTRO (PILLS) */
        .pills-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
        }
        .pills-container::-webkit-scrollbar {
            display: none;
        }

        .pill {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .pill.active {
            background: white;
            color: #e62222;
        }

        /* CONTADOR */
        .counter-text {
            padding: 16px 16px 4px;
            font-size: 14px;
            color: #888;
            font-weight: 600;
        }

        /* CONTAINER DOS CARDS */
        .recipes-container {
            padding: 8px 16px 30px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* CARD TRADICIONAL CLEAN */
        .recipe-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
            padding: 20px;
            border: 1px solid #f0f2f5;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .recipe-card:active {
            transform: scale(0.99);
        }

        .card-main-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-info-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .recipe-title {
            font-size: 22px;
            color: #0f172a;
            font-weight: 700;
        }

        .recipe-category {
            font-size: 11px;
            color: #ff5e00;
            background: #fff0ea;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 6px;
            width: fit-content;
        }

        .card-actions-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-star {
            color: #3b82f6;
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .btn-star.favorited {
            color: #ffb300;
        }

        .arrow-icon {
            color: #cbd5e1;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .recipe-card.expanded .arrow-icon {
            transform: rotate(180deg);
            color: #ff5e00;
        }

        /* LISTA EXPANSÍVEL INTERNA */
        .card-dropdown-content {
            display: none;
            margin-top: 16px;
            border-top: 1px solid #f1f5f9;
            padding-top: 14px;
        }
        .recipe-card.expanded .card-dropdown-content {
            display: block;
        }

        .variation-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 16px;
            color: #334155;
            border-bottom: 1px solid #f8fafc;
        }
        .variation-row:last-child {
            border-bottom: none;
        }
        .variation-name {
            font-weight: 500;
        }
        .variation-detail {
            font-weight: 700;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <h1>Sem Receitas</h1>
            <a href="sugestoes.html" class="btn-menu">☰</a>
        </div>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar pratos, ingredientes ou categorias..">
        </div>
        <div class="pills-container" id="pillsContainer"></div>
    </div>

    <div class="counter-text" id="counterText">Carregando receitas...</div>
    <div class="recipes-container" id="recipesContainer"></div>

    <script>
        // Array global que receberá os dados externos
        let bancoDeDados = [];
        let categoriaAtiva = "Todos";
        const favoritos = {};
        const cardsExpandidos = {};

        const recipesContainer = document.getElementById('recipesContainer');
        const searchInput = document.getElementById('searchInput');
        const pillsContainer = document.getElementById('pillsContainer');
        const counterText = document.getElementById('counterText');

        // TECNOLOGIA DE CARREGAMENTO DINÂMICO (Para aguentar mais de 200 pratos sem pesar)
        async function carregarDados() {
            try {
                // Ele vai buscar o arquivo receitas.json contendo a lista pura de dados
                const resposta = await fetch('receitas.json');
                bancoDeDados = await resposta.json();
                
                // Inicializa os estados de controle
                bancoDeDados.forEach(r => {
                    favoritos[r.id] = false;
                    cardsExpandidos[r.id] = false;
                });

                renderPills();
                renderRecipes();
            } catch (erro) {
                console.error("Erro ao carregar o arquivo de receitas JSON:", erro);
                counterText.innerHTML = "Erro ao carregar a lista de receitas.";
            }
        }

        function renderPills() {
            const categorias = ["Todos", ...new Set(bancoDeDados.map(r => r.categoria))];
            pillsContainer.innerHTML = categorias.map(cat => `
                <div class="pill ${cat === categoriaAtiva ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</div>
            `).join('');
        }

        window.setCategory = function(cat) {
            categoriaAtiva = cat;
            renderPills();
            renderRecipes();
        }

        window.toggleFavorite = function(id, event) {
            event.stopPropagation();
            favoritos[id] = !favoritos[id];
            renderRecipes();
        }

        window.toggleCard = function(id) {
            cardsExpandidos[id] = !cardsExpandidos[id];
            renderRecipes();
        }

        function renderRecipes() {
            const busca = searchInput.value.toLowerCase();
            recipesContainer.innerHTML = "";

            const filtrados = bancoDeDados.filter(r => {
                const matchesCategory = (categoriaAtiva === "Todos" || r.categoria === categoriaAtiva);
                const matchesSearch = r.nome.toLowerCase().includes(busca) || r.categoria.toLowerCase().includes(busca);
                return matchesCategory && matchesSearch;
            });

            counterText.innerHTML = `Exibindo ${filtrados.length} de ${bancoDeDados.length} pratos únicos`;

            if(filtrados.length === 0) {
                recipesContainer.innerHTML = `<p style="text-align:center; padding:40px; color:#888; font-weight:bold;">Nenhum prato encontrado.</p>`;
                return;
            }

            filtrados.forEach(recipe => {
                const isExpanded = cardsExpandidos[recipe.id];
                const card = document.createElement('div');
                card.className = `recipe-card ${isExpanded ? 'expanded' : ''}`;
                card.setAttribute('onclick', `toggleCard(${recipe.id})`);

                let variationsHtml = "";
                if(recipe.variações && recipe.variações.length > 0) {
                    recipe.variações.forEach(v => {
                        variationsHtml += `
                            <div class="variation-row">
                                <span class="variation-name">${v.nome}</span>
                                <span class="variation-detail">${v.detalhe}</span>
                            </div>
                        `;
                    });
                }

                card.innerHTML = `
                    <div class="card-main-row">
                        <div class="card-info-left">
                            <h2 class="recipe-title">${recipe.nome}</h2>
                            <span class="recipe-category">${recipe.categoria}</span>
                        </div>
                        <div class="card-actions-right">
                            <button class="btn-star ${favoritos[recipe.id] ? 'favorited' : ''}" onclick="toggleFavorite(${recipe.id}, event)">
                                ${favoritos[recipe.id] ? '★' : '☆'}
                            </button>
                            <span class="arrow-icon">▼</span>
                        </div>
                    </div>
                    <div class="card-dropdown-content">
                        ${variationsHtml}
                    </div>
                `;
                recipesContainer.appendChild(card);
            });
        }

        searchInput.addEventListener('input', renderRecipes);

        // Inicia o carregamento assíncrono
        carregarDados();
    </script>
</body>
</html>
