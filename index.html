<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Receitas</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f7f9fc; margin: 0; padding: 0; color: #333; }
        
        .header {
            background: linear-gradient(135deg, #ff5e00, #e62222);
            padding: 25px 20px 30px 20px;
            position: relative;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .logo-circle { 
            background: white; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
        }
        .header h1 { color: white; margin: 0; font-size: 26px; font-weight: bold; }
        
        .btn-menu {
            position: absolute;
            top: 28px;
            right: 22px;
            color: white;
            text-decoration: none;
            font-size: 32px;
            line-height: 1;
            z-index: 10;
        }

        .search-container { position: relative; width: 100%; }
        .search-container input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            outline: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .search-container::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 14px;
            font-size: 16px;
            color: #999;
        }

        .container { padding: 20px 15px; }

        .recipe-card {
            background: white;
            border-radius: 18px;
            border: 1px solid #eef2f6;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }
        
        .recipe-header { 
            padding: 20px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .recipe-title { font-size: 18px; font-weight: bold; color: #1e293b; margin: 0 0 6px 0; }
        
        .category-badge {
            background: #fff3eb;
            color: #e67e22;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .arrow-icon { 
            font-size: 16px; 
            color: #cbd5e1; 
            transition: transform 0.3s; 
        }
        
        .recipe-card.collapsed .recipe-content { display: none; }
        .recipe-card.collapsed .arrow-icon { transform: rotate(0deg); }
        .recipe-card:not(.collapsed) .arrow-icon { transform: rotate(180deg); }

        .recipe-content { padding: 0 20px 20px 20px; border-top: 1px solid #f8fafc; }
        .recipe-desc { font-style: italic; color: #64748b; margin: 15px 0; font-size: 14px; line-height: 1.4; }

        .control-label { font-size: 11px; font-weight: bold; color: #b25900; letter-spacing: 0.5px; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .select-variation {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ffd8b3;
            font-size: 15px;
            background: white;
            color: #333;
            margin-bottom: 15px;
            outline: none;
        }
        .yield-box {
            background: #fffdf9;
            border: 1px solid #fbeee6;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .slider-wrapper { display: flex; align-items: center; gap: 12px; }
        .yield-slider { accent-color: #e67e22; width: 100px; cursor: pointer; }
        .yield-badge {
            background: #fff5eb;
            color: #e67e22;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #fbe6d4;
        }

        .section-title { font-size: 14px; font-weight: bold; color: #64748b; margin: 20px 0 10px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .list-item {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .list-item input[type="checkbox"] { transform: scale(1.2); accent-color: #e67e22; }
        .list-item span { font-size: 15px; line-height: 1.4; color: #334155; }
        .list-item.checked span { text-decoration: line-through; color: #94a3b8; }
        .num-destaque { color: #e67e22; font-weight: bold; }

        .fin-item {
            background: #f8fafc;
            border-left: 4px solid #e67e22;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .fin-item input[type="radio"] { transform: scale(1.3); margin-top: 3px; accent-color: #e67e22; }
        .fin-text { font-size: 15px; color: #334155; line-height: 1.4; cursor: pointer; }
        .fin-opt-title { font-weight: bold; color: #e67e22; display: block; margin-bottom: 2px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <div class="logo-circle">🍴</div>
            <h1>Sem Receitas</h1>
        </div>
        <a href="sugestoes.html" class="btn-menu">☰</a>

        <div class="search-container">
            <input type="text" id="inputBusca" placeholder="Busque sua receita, ou nos deixe uma sugestão👉" oninput="filtrarReceitas()">
        </div>
    </div>

    <div class="container" id="listaReceitas">
        <p style="text-align:center; color:#64748b; margin-top:40px;">Carregando receitas...</p>
    </div>

<script>
    let bancoDeDados = [];
    let porcoesSelecionadas = {};

    function carregarDadosDoJson() {
        // ./ garante que o caminho busque na mesma pasta do repositório do GitHub
        fetch('./receitas.json')
            .then(resposta => {
                if (!resposta.ok) throw new Error("Arquivo receitas.json não encontrado ou erro no servidor.");
                return resposta.json();
            })
            .then(dados => {
                bancoDeDados = dados;
                bancoDeDados.forEach(r => { porcoesSelecionadas[r.id] = 2; });
                renderizarReceitas(bancoDeDados);
            })
            .catch(erro => {
                console.error("Erro detalhado:", erro);
                document.getElementById('listaReceitas').innerHTML = 
                    `<p style="text-align:center; color:red; margin-top:40px; font-weight:bold;">
                        Não foi possível carregar as receitas do arquivo .json<br>
                        <span style="font-size:12px; color:#64748b; font-weight:normal;">Verifique se o arquivo foi enviado corretamente ou se há erros de sintaxe nele.</span>
                    </p>`;
            });
    }

    function renderizarReceitas(lista) {
        const container = document.getElementById('listaReceitas');
        container.innerHTML = '';

        if (lista.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:40px;">Nenhuma receita encontrada...</p>';
            return;
        }

        lista.forEach(receita => {
            const card = document.createElement('div');
            card.className = "recipe-card collapsed";
            card.id = `card_${receita.id}`;

            const varIndex = 0;
            const variacaoAtiva = receita.variacoes[varIndex];
            const pAtuais = porcoesSelecionadas[receita.id];

            card.innerHTML = `
                <div class="recipe-header" onclick="toggleCard(${receita.id})">
                    <div>
                        <div class="recipe-title">${receita.titulo}</div>
                        <span class="category-badge">CATEGORIA: ${receita.categoria}</span>
                    </div>
                    <div class="arrow-icon">🡫</div>
                </div>
                
                <div class="recipe-content">
                    <div class="recipe-desc">${receita.descricao || ''}</div>
                    
                    <span class="control-label">Variação / Estilo:</span>
                    <select class="select-variation" onchange="mudarVariacao(${receita.id}, this.value)">
                        ${receita.variacoes.map((v, idx) => `<option value="${idx}">${v.nome}</option>`).join('')}
                    </select>

                    <div class="yield-box">
                        <span class="control-label" style="margin:0;">Rendimento:</span>
                        <div class="slider-wrapper">
                            <input type="range" class="yield-slider" min="1" max="10" value="${pAtuais}" oninput="atualizarPorcoes(${receita.id}, this.value, ${varIndex})">
                            <span class="yield-badge">👥 <span>${pAtuais}</span> Pessoas</span>
                        </div>
                    </div>

                    <div class="section-title">Basket Ingredientes</div>
                    <div id="ingredientes_${receita.id}">
                        ${renderIngredientes(variacaoAtiva, pAtuais)}
                    </div>

                    <div class="section-title">Modo de Preparo</div>
                    <div id="passos_${receita.id}">
                        ${variacaoAtiva.passos.map((passo, idx) => `
                            <div class="list-item" onclick="toggleCheck(this, event)">
                                <input type="checkbox">
                                <span><strong>${idx+1}.</strong> ${passo}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="section-title">Finalização</div>
                    <div id="finalizacoes_${receita.id}">
                        ${renderFinalizacao(variacaoAtiva.finalizacoes, receita.id)}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function renderIngredientes(variacao, porcoesDesejadas) {
        return variacao.ingredientes.map(ing => {
            const qtdCalculada = ((ing.qtd / variacao.porcoesBase) * porcoesDesejadas).toFixed(2).replace('.00', '').replace('.', ',');
            return `
                <div class="list-item" onclick="toggleCheck(this, event)">
                    <input type="checkbox">
                    <span><span class="num-destaque">${qtdCalculada}</span> ${ing.unidade} ${ing.nome}</span>
                </div>
            `;
        }).join('');
    }

    function renderFinalizacao(finalizacoes, receitaId) {
        if (!finalizacoes || finalizacoes.length === 0) return '';
        const eMultipla = finalizacoes.length > 1;
        return finalizacoes.map((item, idx) => {
            const textoLimpo = item.replace(/^Opção\s+[a-zA-Zà-úÀ-Ú]+\s*:\s*/i, '');
            return `
                <div class="fin-item">
                    ${eMultipla ? `<input type="radio" name="fin_grupo_${receitaId}" id="fin_${receitaId}_${idx}">` : ''}
                    <label class="fin-text" for="fin_${receitaId}_${idx}">
                        ${eMultipla ? `<span class="fin-opt-title">OPÇÃO ${idx+1}</span>` : ''}
                        ${textoLimpo}
                    </label>
                </div>
            `;
        }).join('');
    }

    function toggleCard(id) {
        document.getElementById(`card_${id}`).classList.toggle('collapsed');
    }

    function toggleCheck(elemento, evento) {
        const box = elemento.querySelector('input');
        if (evento.target === box) {
            elemento.classList.toggle('checked', box.checked);
            return;
        }
        box.checked = !box.checked;
        elemento.classList.toggle('checked', box.checked);
    }

    function atualizarPorcoes(id, valor, varIdx) {
        porcoesSelecionadas[id] = parseInt(valor);
        const card = document.getElementById(`card_${id}`);
        card.querySelector('.yield-badge span').innerText = valor;
        
        const variacao = bancoDeDados.find(r => r.id === id).variacoes[varIdx];
        document.getElementById(`ingredientes_${id}`).innerHTML = renderIngredientes(variacao, valor);
    }

    function mudarVariacao(id, varIdx) {
        const receita = bancoDeDados.find(r => r.id === id);
        const variacaoAtiva = receita.variacoes[varIdx];
        const pAtuais = porcoesSelecionadas[id];

        document.getElementById(`ingredientes_${id}`).innerHTML = renderIngredientes(variacaoAtiva, pAtuais);
        
        document.getElementById(`passos_${id}`).innerHTML = variacaoAtiva.passos.map((passo, idx) => `
            <div class="list-item" onclick="toggleCheck(this, event)">
                <input type="checkbox">
                <span><strong>${idx+1}.</strong> ${passo}</span>
            </div>
        `).join('');

        document.getElementById(`finalizacoes_${id}`).innerHTML = renderFinalizacao(variacaoAtiva.finalizacoes, id);
        
        const card = document.getElementById(`card_${id}`);
        card.querySelector('.yield-slider').setAttribute('oninput', `atualizarPorcoes(${id}, this.value, ${varIdx})`);
    }

    function filtrarReceitas() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const filtradas = bancoDeDados.filter(r => 
            r.titulo.toLowerCase().includes(termo) || 
            r.categoria.toLowerCase().includes(termo)
        );
        renderizarReceitas(filtradas);
    }

    document.addEventListener('DOMContentLoaded', carregarDadosDoJson);
</script>
</body>
</html>
