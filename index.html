<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Receitas - Catálogo Prático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Header Focado em Busca -->
    <header class="bg-gradient-to-r from-orange-500 to-red-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex flex-col gap-3">
            <div class="flex items-center gap-3">
                <i class="fa-solid font-black fa-utensils text-xl bg-white text-orange-600 p-2 rounded-full shadow"></i>
                <h1 class="text-2xl font-bold tracking-tight">Sem Receitas</h1>
            </div>
            <div class="w-full relative">
                <input type="text" id="search-input" placeholder="Buscar 100+ pratos, categorias ou épocas (Ex: Natal, Sorvete, Torta...)" 
                    class="w-full pl-10 pr-4 py-2.5 rounded-xl border-none text-gray-900 focus:ring-2 focus:ring-orange-300 shadow-inner outline-none text-sm">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-gray-400"></i>
            </div>
        </div>
    </header>

    <!-- Container do Accordion -->
    <main class="max-w-3xl mx-auto px-4 py-6 flex-grow w-full">
        <div id="recipes-accordion-container" class="space-y-4">
            <div class="text-center py-12 text-gray-400 text-sm">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-2 text-orange-500"></i>
                <p>Carregando catálogo de receitas...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white text-gray-400 py-4 text-center border-t border-gray-100 text-xs mt-auto">
        <p>&copy; 2026 Sem Receitas. Todos os direitos reservados.</p>
    </footer>

    <script>
        const TARGET_PORTIONS = 2;
        let recipeDatabase = [];
        let activeRecipeId = null;
        let activeVariationsState = {}; 

        const searchInput = document.getElementById('search-input');
        const accordionContainer = document.getElementById('recipes-accordion-container');

        // Carrega o banco de dados via AJAX (Funciona perfeitamente no GitHub Pages)
        async function init() {
            try {
                const response = await fetch('./recipes.json');
                if (!response.ok) throw new Error();
                recipeDatabase = await response.json();
                
                recipeDatabase.forEach(r => {
                    activeVariationsState[r.id] = 0;
                });
                
                renderAccordion(recipeDatabase);

                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase().trim();
                    const filtered = recipeDatabase.filter(r => 
                        r.name.toLowerCase().includes(term) || 
                        r.description.toLowerCase().includes(term)
                    );
                    renderAccordion(filtered);
                });
            } catch (err) {
                accordionContainer.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-red-200 text-red-500 text-sm p-6 shadow-sm">
                        <i class="fa-solid fa-file-circle-exclamation text-4xl mb-3"></i>
                        <p class="font-bold text-base">Arquivo "recipes.json" não encontrado!</p>
                        <p class="text-gray-500 mt-2 text-xs">Crie o arquivo recipes.json no seu repositório usando o gerador do passo 2.</p>
                    </div>`;
            }
        }

        function renderAccordion(list) {
            accordionContainer.innerHTML = '';

            if (list.length === 0) {
                accordionContainer.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-gray-100 text-gray-400 text-sm shadow-sm">
                        <i class="fa-solid fa-cookie-bite text-3xl mb-2 text-gray-200"></i>
                        <p>Nenhuma receita encontrada para este termo...</p>
                    </div>`;
                return;
            }

            list.forEach(recipe => {
                const isOpen = (recipe.id === activeRecipeId);
                const currentVarIdx = activeVariationsState[recipe.id];
                const variation = recipe.variations[currentVarIdx];
                const factor = TARGET_PORTIONS / variation.basePortions;

                const recipeCard = document.createElement('div');
                recipeCard.className = `bg-white rounded-2xl border transition-all duration-200 overflow-hidden shadow-sm ${isOpen ? 'border-orange-500 ring-1 ring-orange-100' : 'border-gray-200'}`;

                // Cabeçalho Limpo
                const headerBtn = document.createElement('button');
                headerBtn.className = `w-full text-left p-4 flex justify-between items-center bg-white hover:bg-gray-50 focus:outline-none select-none`;
                headerBtn.onclick = () => toggleRecipe(recipe.id);
                
                const categoryTag = recipe.description.match(/\[(.*?)\]/)?.[1] || "Receita";
                const cleanDesc = recipe.description.replace(/\[.*?\]\s*/, '');

                headerBtn.innerHTML = `
                    <div>
                        <h3 class="font-bold text-gray-800 text-base leading-tight">${recipe.name}</h3>
                        <span class="inline-block mt-1 text-[10px] font-bold uppercase tracking-wider text-orange-600 bg-orange-50 px-2 py-0.5 rounded-md">${categoryTag}</span>
                    </div>
                    <i class="fa-solid ${isOpen ? 'fa-chevron-up text-orange-500' : 'fa-chevron-down text-gray-300'} transition-transform duration-200 text-sm ml-2"></i>
                `;
                recipeCard.appendChild(headerBtn);

                if (isOpen) {
                    const bodyContent = document.createElement('div');
                    bodyContent.className = `border-t border-gray-100 bg-white`;

                    let selectOptions = recipe.variations.map((v, idx) => 
                        `<option value="${idx}" ${idx === currentVarIdx ? 'selected' : ''}>${v.name}</option>`
                    ).join('');

                    bodyContent.innerHTML = `
                        <div class="p-4 bg-gray-50 text-xs text-gray-600 italic border-b border-gray-100">
                            ${cleanDesc}
                        </div>
                        
                        <div class="p-4 bg-orange-50/60 border-b border-orange-100/50 grid grid-cols-1 gap-3.5">
                            <div>
                                <label class="block text-[10px] font-extrabold text-orange-800 uppercase tracking-wider mb-1">Variação / Estilo:</label>
                                <select onchange="changeRecipeVariation('${recipe.id}', this.value)" 
                                    class="w-full bg-white border border-orange-200 text-gray-700 py-2 px-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 text-xs font-semibold cursor-pointer shadow-sm">
                                    ${selectOptions}
                                </select>
                            </div>
                            <div class="flex justify-between items-center bg-white px-3 py-2 rounded-xl border border-orange-100/60 shadow-sm">
                                <span class="text-[10px] font-extrabold text-orange-800 uppercase tracking-wider">Rendimento:</span>
                                <span class="text-xs font-extrabold text-orange-600 bg-orange-100/80 px-2.5 py-0.5 rounded-full"><i class="fa-solid fa-users mr-1"></i> 2 Pessoas</span>
                            </div>
                        </div>

                        <!-- Ingredientes -->
                        <div class="p-4">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2.5 flex items-center gap-1.5">
                                <i class="fa-solid fa-basket-shopping text-orange-500 text-sm"></i> Ingredientes
                            </h4>
                            <div class="grid grid-cols-1 gap-2">
                                ${variation.ingredients.map((ing, i) => {
                                    const calculatedQty = (ing.baseQty * factor).toLocaleString('pt-BR', { maximumFractionDigits: 2 });
                                    return `
                                        <label class="flex items-start gap-3 p-2.5 rounded-xl bg-gray-50 border border-gray-100/70 cursor-pointer select-none text-xs" onclick="event.stopPropagation();">
                                            <input type="checkbox" class="mt-0.5 accent-emerald-500 rounded text-white w-4 h-4 flex-shrink-0 cursor-pointer" onchange="toggleChecklistItem(this)">
                                            <span class="text-gray-700 font-medium">
                                                <strong class="text-orange-600 font-bold">${calculatedQty}</strong> ${ing.unit} de ${ing.name}
                                            </span>
                                        </label>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Modo de Preparo -->
                        <div class="p-4 border-t border-gray-100">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2.5 flex items-center gap-1.5">
                                <i class="fa-solid fa-kitchen-set text-orange-500 text-sm"></i> Passo a Passo
                            </h4>
                            <div class="space-y-2">
                                ${variation.steps.map((step, i) => `
                                    <label class="flex items-start gap-3.5 p-3 rounded-xl bg-gray-50 border border-gray-100/70 cursor-pointer select-none text-xs" onclick="event.stopPropagation();">
                                        <input type="checkbox" class="mt-0.5 accent-emerald-500 rounded text-white w-4 h-4 flex-shrink-0 cursor-pointer" onchange="toggleChecklistItem(this)">
                                        <div class="text-gray-700 leading-relaxed">
                                            <span class="font-bold text-[10px] uppercase tracking-wider text-gray-400 block mb-0.5">Etapa ${i + 1}</span>
                                            <p class="desc-text">${step}</p>
                                        </div>
                                    </label>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Finalização -->
                        <div class="p-4 border-t border-gray-100 bg-gradient-to-b from-transparent to-gray-50/40">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2.5 flex items-center gap-1.5">
                                <i class="fa-solid fa-plate-wheat text-orange-500 text-sm"></i> Finalização e Toque do Chef
                            </h4>
                            <div class="space-y-2">
                                ${variation.finishing.map((fStep, i) => `
                                    <label class="flex items-start gap-3.5 p-3 rounded-xl bg-gray-50 border border-gray-100/70 cursor-pointer select-none text-xs" onclick="event.stopPropagation();">
                                        <input type="checkbox" class="mt-0.5 accent-emerald-500 rounded text-white w-4 h-4 flex-shrink-0 cursor-pointer" onchange="toggleChecklistItem(this)">
                                        <div class="text-gray-700 leading-relaxed">
                                            <span class="font-bold text-[10px] uppercase tracking-wider text-gray-400 block mb-0.5">Finalização ${i + 1}</span>
                                            <p class="desc-text">${fStep}</p>
                                        </div>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    recipeCard.appendChild(bodyContent);
                }

                accordionContainer.appendChild(recipeCard);
            });
        }

            function toggleRecipe(id) {
                activeRecipeId = (activeRecipeId === id) ? null : id;
                refreshView();
            }

            function changeRecipeVariation(recipeId, valueIndex) {
                activeVariationsState[recipeId] = parseInt(valueIndex);
                refreshView();
            }

            function refreshView() {
                const term = searchInput.value.toLowerCase().trim();
                const filtered = recipeDatabase.filter(r => 
                    r.name.toLowerCase().includes(term) || 
                    r.description.toLowerCase().includes(term)
                );
                renderAccordion(filtered);
            }

            function toggleChecklistItem(checkbox) {
                const parentLabel = checkbox.parentElement;
                const textContent = parentLabel.querySelector('.desc-text') || checkbox.nextElementSibling;
                
                if (checkbox.checked) {
                    textContent.classList.add('line-through', 'text-gray-400');
                    parentLabel.classList.add('bg-emerald-50/80', 'border-emerald-100');
                } else {
                    textContent.classList.remove('line-through', 'text-gray-400');
                    parentLabel.classList.remove('bg-emerald-50/80', 'border-emerald-100');
                }
            }

            window.onload = init;
    </script>
</body>
</html>
